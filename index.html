<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activity 3</title>

<link rel="stylesheet" href="style.css">
</head>

<style>
  body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    padding: 50px;
  }

  h1 {
    margin-bottom: 40px;
  }

  h2 {
    margin-bottom: 15px;
    font-weight: normal;
  }

  .row {
    display: flex;
    gap: 50px;
    margin-bottom: 50px;
    align-items: flex-start;
  }

  .section {
    flex: none;
  }

  /* WHITE BOX */
  .box {
    background: white;
    padding: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  button {
    white-space: nowrap;
    cursor: pointer;
  }

  /* Uber */
  .uber-btn {
    background: black;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
  }

  /* Amazon */
  .amazon-btn {
    background: rgb(255, 216, 20);
    border: none;
    padding: 15px 60px;
    border-radius: 30px;
    font-size: 18px;
  }

  /* GitHub */
  .github-btn {
    background: rgb(46, 164, 79);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 6px;
    font-size: 16px;
  }

  /* Bootstrap */
  .bootstrap-box {
    display: flex;
    gap: 12px;
  }

  .bootstrap-primary {
    background: rgb(121, 82, 179);
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 6px;
  }

  .bootstrap-secondary {
    background: transparent;
    color: rgb(108, 117, 125);
    border: 2px solid rgb(108, 117, 125);
    padding: 12px 25px;
    border-radius: 6px;
  }

  /* LinkedIn */
  .linkedin-box {
    display: inline-flex;
    gap: 12px;
    align-items: center;
    flex-wrap: nowrap;
    padding: 20px;
    background: white;
    border-radius: 8px;
  }

  .linkedin-apply {
    background: rgb(10, 102, 194);
    color: white;
    border: none;
    padding: 15px 35px;
    border-radius: 25px;
    font-size: 16px;
  }

  .linkedin-save {
    background: transparent;
    color: rgb(10, 102, 194);
    border: 2px solid rgb(10, 102, 194);
    padding: 13px 28px;
    border-radius: 25px;
    font-size: 16px;
  }

</style>
</head>

<body>

<h1>Activity 3</h1>

<div class="row">

  <div class="section">
    <h2>2a. Uber</h2>
    <div class="box">
      <button class="uber-btn">Request now</button>
    </div>
  </div>

  <div class="section">
    <h2>2b. Amazon</h2>
    <div class="box">
      <button class="amazon-btn">Add to Cart</button>
    </div>
  </div>

  <div class="section">
    <h2>2c. GitHub</h2>
    <div class="box">
      <button class="github-btn">Sign up</button>
    </div>
  </div>

</div>

<div class="row">

  <div class="section">
    <h2>2d. Bootstrap</h2>
    <div class="box bootstrap-box">
      <button class="bootstrap-primary">Get started</button>
      <button class="bootstrap-secondary">Download</button>
    </div>
  </div>

  <div class="section">
    <h2>2e. LinkedIn</h2>
    <div class="box linkedin-box">
      <button class="linkedin-apply">Apply on company website</button>
      <button class="linkedin-save">Save</button>
    </div>
  </div>

</div>

</body>
</html>
